$:
  vscode:
    - docker:
        build: .ide/Dockerfile
        volumes:
          - /go/pkg/mod
          - /root/.cache/go-build
      services:
        - vscode
        - docker
      stages:
        - name: ls
          script: ls -al

main:
  pull_request: &pr-lint
    - name: pipeline-golint
      docker:
        build: .ide/Dockerfile
        volumes:
          - /go/pkg/mod
          - /root/.cache/go-build
      stages:
        - name: stage-version
          script: go version
        - name: stage-mod
          script: go mod download
        - name: stage-test
          script: go test ./...
        - name: stage-lint
          script: golangci-lint run ./...

    - name: commit-lint
      stages:
        - name: commit lint
          image: cnbcool/commitlint

  push:
    - <<: *pr-lint

  pull_request.mergeable:
    - name: auto-merge
      stages:
        - name: CR 通过后自动合并
          type: git:auto-merge
          options:
            mergeType: squash
            removeSourceBranch: true