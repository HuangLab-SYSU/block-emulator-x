name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [ linux, windows, darwin ]
        goarch: [ amd64, arm64 ]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build all commands
        run: |
          mkdir -p dist
          for cmd in consensusnode supervisor; do
            OUTPUT_NAME="blockemulator-${cmd}-${{ matrix.goos }}-${{ matrix.goarch }}"
            if [ "${{ matrix.goos }}" = "windows" ]; then
              OUTPUT_NAME="${OUTPUT_NAME}.exe"
            fi
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
              go build -o "dist/${OUTPUT_NAME}" "./cmd/${cmd}"
          done

      - name: Package as archives
        run: |
          cd dist
          for file in *; do
            if [[ "$file" == *.exe ]]; then
              # Windows: zip
              zip "../dist/${file%.exe}.zip" "$file"
            else
              # Others: tar.gz
              tar -czf "../dist/${file}.tar.gz" "$file"
            fi
          done
          cd ..
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  create-release:
    name: Create GitHub Release
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Get tag name
        id: meta
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create Release with Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip