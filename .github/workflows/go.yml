name: Go CI

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - '**/*.go'
  workflow_dispatch:

jobs:
  build-test-lint:
    name: Build / Test / Lint (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ "1.24" ]
    env:
      GO111MODULE: "on"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/golangci-lint
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-mod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-mod-

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b /usr/local/bin v2.7.0

      - name: Download modules
        run: go mod download

      - name: Tidy Diff
        run: go mod tidy -diff

      - name: Run golangci-lint
        run: golangci-lint run --timeout 5m ./...

      - name: Run unit tests (with coverage)
        run: |
          mkdir -p test-coverage
          go test -v -covermode=atomic -coverprofile=test-coverage/coverage.out -gcflags=all='-N -l' ./...

      - name: Build binaries
        run: go build -v ./...
        env:
          CGO_ENABLED: 0

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: test-coverage/coverage.out
          retention-days: 3

      - name: Print summary
        run: echo "Done. Built and tested on Go ${{ matrix.go-version }}."
